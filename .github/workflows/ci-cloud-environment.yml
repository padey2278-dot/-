name: CI-Cloud-Environment

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Persisted Data
        run: |
          if [ -f data.tar.gz ]; then
            tar -xzf data.tar.gz -C ~/
          fi

      - name: Install Apps from Repository
        run: |
          chmod +x ./install-apps.sh
          ./install-apps.sh

      - name: Configure Desktop Performance
        run: |
          mkdir -p ~/.config/xfce4/xfconf/xfce-perchannel-xml/
          cat <<EOF > ~/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="use_compositing" type="bool" value="false"/>
              <property name="draw_frame" type="bool" value="true"/>
              <property name="box_move" type="bool" value="true"/>
            </property>
          </channel>
          EOF

      # ✅ FIXED STEP (separate uses)
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Prevent Auto-Disable
        uses: gautamkrishnar/keepalive-workflow@v2

      - name: Save Persisted Data
        run: |
          tar -czf data.tar.gz -C ~/ .
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.tar.gz
          git commit -m "Persist user data" || echo "No changes"
          git push

      - name: Finalize & Connection Info
        run: |
          echo "--------------------------------------------"
          echo "STATUS: SYSTEM ONLINE"
          echo "Tailscale IP:"
          tailscale ip -4 || echo "Tailscale not ready"
          echo "User: runner"
          echo "Pass: password123"
          echo "--------------------------------------------"
          sleep 21600
