name: Cloud-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # ⚡ Install Lightweight Desktop
      # ----------------------------
      - name: Install Desktop + noVNC
        run: |
          sudo apt-get update
          sudo apt-get install -y xfce4 xfce4-terminal tightvncserver novnc websockify

      # ----------------------------
      # 🖥️ Setup VNC
      # ----------------------------
      - name: Setup VNC Server
        run: |
          mkdir -p ~/.vnc
          echo "password123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          cat <<EOF > ~/.vnc/xstartup
          #!/bin/bash
          startxfce4 &
          EOF

          chmod +x ~/.vnc/xstartup

      # ----------------------------
      # 🚀 Start Desktop
      # ----------------------------
      - name: Start Desktop
        run: |
          vncserver :1 -geometry 1280x720 -depth 24

      # ----------------------------
      # 🌐 Start noVNC (browser access)
      # ----------------------------
      - name: Start noVNC
        run: |
          websockify --web=/usr/share/novnc/ 6080 localhost:5901 &
      
      # ----------------------------
      # 🌍 Setup Tailscale (PRIVATE ACCESS)
      # ----------------------------
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # ----------------------------
      # 📡 Show connection info
      # ----------------------------
      - name: Connection Info
        run: |
          echo "=============================="
          echo "🌐 noVNC URL:"
          echo "http://<TAILSCALE-IP>:6080/vnc.html"
          echo ""
          echo "🔐 Password: password123"
          echo ""
          echo "📡 Tailscale IP:"
          tailscale ip -4
          echo "=============================="

      # ----------------------------
      # ⏳ Keep alive (6 hours max)
      # ----------------------------
      - name: Keep Alive
        run: sleep 21600
