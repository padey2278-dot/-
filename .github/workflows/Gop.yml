name: CI-Cloud-Environment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Update & Install System
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xfce4 xfce4-goodies xrdp dbus-x11 x11-xserver-utils curl

      - name: Setup XFCE + XRDP
        run: |
          echo "startxfce4" > ~/.xsession

          # Disable lag (no compositor)
          mkdir -p ~/.config/xfce4/xfconf/xfce-perchannel-xml/
          cat <<EOF > ~/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="use_compositing" type="bool" value="false"/>
            </property>
          </channel>
          EOF

          # Create user
          sudo useradd -m Aditya || true
          echo "Aditya:aditya*pro" | sudo chpasswd
          sudo usermod -aG sudo Aditya

          # Backup user
          echo "runner:aditya*pro" | sudo chpasswd

          sudo adduser xrdp ssl-cert
          sudo systemctl restart xrdp

      - name: Install Tailscale (manual)
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "$TS_AUTHKEY" ]; then
            echo "❌ ERROR: TAILSCALE_AUTHKEY missing!"
            exit 1
          fi

          sudo tailscale up --authkey=$TS_AUTHKEY --hostname=github-runner --accept-routes

      - name: Show Connection Info
        run: |
          echo "--------------------------------------"
          echo "🌐 CONNECT USING TAILSCALE IP"
          echo ""
          tailscale ip -4
          echo ""
          echo "👤 Username: Aditya"
          echo "🔑 Password: aditya*pro"
          echo "--------------------------------------"

      - name: Keep Alive
        run: sleep 21600
