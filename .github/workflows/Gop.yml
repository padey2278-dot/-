name: Quick-RDP-Tailscale

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install Desktop (FAST)
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xfce4 xfce4-session xrdp dbus-x11 curl

      - name: Fix Session (NO BLACK SCREEN)
        run: |
          echo "startxfce4" > ~/.xsession
          chmod +x ~/.xsession
          echo xfce4-session > ~/.xsessionrc

      - name: Create User
        run: |
          sudo useradd -m Aditya || true
          echo "Aditya:aditya*pro" | sudo chpasswd
          echo "runner:aditya*pro" | sudo chpasswd

      - name: Start XRDP (FIXED)
        run: |
          sudo adduser xrdp ssl-cert || true
          sudo systemctl stop xrdp || true
          sudo systemctl start xrdp

      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "$TS_AUTHKEY" ]; then
            echo "❌ Add TAILSCALE_AUTHKEY in repo secrets"
            exit 1
          fi

          sudo tailscale up --authkey=$TS_AUTHKEY --hostname=rdp-fast

      - name: Show Info
        run: |
          echo "====== CONNECT FAST ======"
          tailscale ip -4
          echo "User: Aditya"
          echo "Pass: aditya*pro"
          echo "Port: 3389"

      - name: Keep Alive
        run: sleep 21600
