name: CI-Cloud-Environment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install Desktop + XRDP
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xfce4 xfce4-goodies xfce4-session \
            xrdp dbus-x11 x11-xserver-utils \
            policykit-1 sudo curl

      - name: Configure XFCE Session (FIX BLACK SCREEN)
        run: |
          # Proper session script
          cat <<'EOF' > ~/.xsession
          #!/bin/bash
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus
          startxfce4
          EOF
          chmod +x ~/.xsession

          # XRDP session hint
          echo xfce4-session > ~/.xsessionrc

          # Disable compositor (lag fix)
          mkdir -p ~/.config/xfce4/xfconf/xfce-perchannel-xml/
          cat <<EOF > ~/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="use_compositing" type="bool" value="false"/>
            </property>
          </channel>
          EOF

      - name: Create User
        run: |
          sudo useradd -m Aditya || true
          echo "Aditya:aditya*pro" | sudo chpasswd
          sudo usermod -aG sudo Aditya

          # backup login
          echo "runner:aditya*pro" | sudo chpasswd

      - name: Start Services
        run: |
          sudo adduser xrdp ssl-cert
          sudo systemctl daemon-reexec
          sudo systemctl restart dbus
          sudo systemctl restart xrdp

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "$TS_AUTHKEY" ]; then
            echo "❌ ERROR: TAILSCALE_AUTHKEY missing"
            exit 1
          fi

          sudo tailscale up \
            --authkey=$TS_AUTHKEY \
            --hostname=github-xrdp \
            --accept-routes

      - name: Show Connection Info
        run: |
          echo "--------------------------------------"
          echo "🌐 CONNECT VIA TAILSCALE"
          echo ""
          tailscale ip -4
          echo ""
          echo "👤 Username: Aditya"
          echo "🔑 Password: aditya*pro"
          echo "Port: 3389"
          echo "--------------------------------------"

      - name: Keep Alive
        run: sleep 21600
