name: Aditya-RDP-REAL-PRO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Create User
        run: |
          net user Aditya "Aditya@Pro9555" /add
          net localgroup administrators Aditya /add

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
          Start-Process ts.exe -ArgumentList "/quiet" -Wait

      - name: Connect Tailscale
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --accept-routes

      - name: Show Connection Info
        run: |
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "=============================="
          Write-Host "RDP READY"
          Write-Host "IP: $ip"
          Write-Host "User: Aditya"
          Write-Host "Pass: Aditya@Pro9555"
          Write-Host "Port: 3389"
          Write-Host "=============================="

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "Alive..."
            Start-Sleep -Seconds 60
          }
