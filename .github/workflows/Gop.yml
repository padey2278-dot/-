name: Aditya-RDP-Runner

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Try Set Runner Password
        continue-on-error: true
        run: |
          net user runner "Runner@1234!"

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
          Start-Process ts.exe -ArgumentList "/quiet" -Wait

      - name: Connect Tailscale
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --accept-routes

      - name: Show Connection Info
        run: |
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "=============================="
          Write-Host "RDP READY"
          Write-Host "IP: $ip"
          Write-Host "User: runner"
          Write-Host "Pass: Runner@1234! (if applied)"
          Write-Host "Port: 3389"
          Write-Host "=============================="

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "Alive..."
            Start-Sleep -Seconds 60
          }
