name: CI-Cloud-Environment

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # max allowed (6 hours)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Desktop & Apps
        run: |
          sudo apt-get update

          # Install XFCE + XRDP + apps
          sudo apt-get install -y \
            xfce4 xfce4-goodies \
            xrdp \
            dbus-x11 x11-xserver-utils \
            libreoffice firefox vlc gimp gnome-calculator

          # Fix session start
          echo "startxfce4" > ~/.xsession

          # Disable compositor (fix lag/wavy effect)
          mkdir -p ~/.config/xfce4/xfconf/xfce-perchannel-xml/
          cat <<EOF > ~/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="use_compositing" type="bool" value="false"/>
            </property>
          </channel>
          EOF

          # Set password for runner user
          echo "runner:password123" | sudo
